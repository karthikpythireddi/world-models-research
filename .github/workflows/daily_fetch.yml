name: Daily Papers Fetch

on:
  schedule:
    - cron: "0 9 * * *"   # 09:00 UTC every day
  workflow_dispatch:        # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests huggingface_hub

      - name: Fetch papers
        run: python scripts/fetch_papers.py

      - name: Commit updated data to GitHub
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/papers.json
          git diff --cached --quiet || git commit -m "chore: daily papers update $(date -u '+%Y-%m-%d')"
          git push

      - name: Push updated papers.json to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          from huggingface_hub import HfApi
          api = HfApi()
          api.upload_file(
              path_or_fileobj="data/papers.json",
              path_in_repo="papers.json",
              repo_id="karthikpythireddi93/world-models-papers",
              repo_type="space",
              token="${{ secrets.HF_TOKEN }}",
              commit_message="Daily papers update",
          )
          print("Pushed papers.json to HF Space")
          EOF
